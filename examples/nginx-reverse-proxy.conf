# Example: terminating TLS with an nginx you already run on the host.
# The Logwatch2 stack listens on 127.0.0.1:8080 (PANEL_PORT).
# Certificates e.g. via: certbot --nginx -d logs.example.com

server {
    listen 443 ssl http2;
    server_name logs.example.com;

    ssl_certificate     /etc/letsencrypt/live/logs.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/logs.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Agents POST batches up to ~1 MB
    client_max_body_size 2m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

server {
    listen 80;
    server_name logs.example.com;
    return 301 https://$host$request_uri;
}
