# Included into http{} by the stock nginx image (conf.d/*.conf), so
# limit_req_zone is valid here. Keyed per agent token / client IP.
limit_req_zone $http_authorization zone=ingest:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login:10m  rate=1r/s;

server {
    listen 80;
    server_name _;

    root /var/www/app/public;
    index index.php;

    client_max_body_size 2m;

    # Ingest rate limit: per agent token (Authorization header), 30 req/s burst 60.
    location /api/v1/ingest/ {
        limit_req zone=ingest burst=60 nodelay;
        try_files $uri /index.php$is_args$args;
    }

    # Login brute-force protection at the edge (app enforces lockout too).
    location /api/v1/auth/login {
        limit_req zone=login burst=5 nodelay;
        try_files $uri /index.php$is_args$args;
    }

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass app:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_hide_header X-Powered-By;
        internal;
    }

    # Never execute anything else, never serve dotfiles.
    location ~ \.php$ { return 404; }
    location ~ /\.   { deny all; }
}
