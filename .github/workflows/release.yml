name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write
  packages: write

jobs:
  agent:
    name: Agent binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build static binaries
        working-directory: agent
        run: |
          mkdir -p dist
          for arch in amd64 arm64; do
            CGO_ENABLED=0 GOOS=linux GOARCH=$arch \
              go build -trimpath \
                -ldflags "-s -w -X github.com/Fabio-Kumahost/logwatch2/agent/internal/shipper.Version=${GITHUB_REF_NAME}" \
                -o "dist/logwatch-agent_linux_$arch" ./cmd/logwatch-agent
            (cd dist && sha256sum "logwatch-agent_linux_$arch" > "logwatch-agent_linux_$arch.sha256")
          done
      - uses: actions/upload-artifact@v4
        with:
          name: agent-binaries
          path: agent/dist/

  panel-image:
    name: Panel image → GHCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3   # arm64 cross-build
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          # Image refs must be lowercase — github.repository preserves owner case.
          tags: |
            ghcr.io/fabio-kumahost/logwatch2-panel:${{ github.ref_name }}
            ghcr.io/fabio-kumahost/logwatch2-panel:latest
          platforms: linux/amd64,linux/arm64

  release:
    name: GitHub release
    needs: [agent, panel-image]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: agent-binaries
          path: dist/
      - name: Build release tarball (panel sources + compose)
        run: |
          mkdir -p "logwatch2-${GITHUB_REF_NAME}"
          cp -r backend docker docs scripts examples \
                docker-compose.yml .env.example install.sh LICENSE README.md \
                "logwatch2-${GITHUB_REF_NAME}/"
          tar -czf "dist/logwatch2-${GITHUB_REF_NAME}.tar.gz" "logwatch2-${GITHUB_REF_NAME}"
          (cd dist && sha256sum "logwatch2-${GITHUB_REF_NAME}.tar.gz" > "logwatch2-${GITHUB_REF_NAME}.tar.gz.sha256")
      - name: Create release with notes from commits
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
